<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Free Account | PurseLens</title><link rel="stylesheet" href="../../css/pages/">
    <link rel="stylesheet" href="../../css/pages/register.css">
    <link rel="stylesheet" href="../../css/themes/light.css">
    <link rel="shortcut icon" href="../../assets/images/PurseLens_logo.png" type="image/x-icon">
</head>
<body>
    <main>
        <div class="main-container">
            <div class="title-wrapper">
                <img src="../../assets/images/PurseLens_logo.png" alt="PurseLens logo">
                <h2>PurseLens</h2>
            </div>
            <div class="heading-wrapper">
                <h1>Create Your Free Account</h1>
                <p>Join thousands who have taken control of their financial narrative.</p>
            </div>
            <form action="" method="post">
                <fieldset>
                    <label for="first-name">First name</label>
                    <input type="text" name="first-name" id="first-name" placeholder="James">
                </fieldset>
                <fieldset>
                    <label for="last-name">Last name</label>
                    <input type="text" name="last-name" id="last-name" placeholder="Smith">
                </fieldset>
                <fieldset>
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="james.smith@example.com">
                </fieldset>
                <fieldset>
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="•••••••••••">
                </fieldset>
                <input type="submit" value="Submit" id="submit-btn">
            </form>
            <div class="social-wrapper">
                <div>
                    <hr> 
                    <p>Or continue with</p>
                    <hr>
                </div>
                <div class="oauth-wrapper">
                    <a href="http://">
                        <img src="../../assets/images/google-logo.png" alt="Google logo">
                        continue with Google
                    </a>
                </div>
            </div>
            <div class="sign-in-wrapper">
                <p>Already have an account?</p>
                <a href="../../pages//auth/login.html"><strong>Login</strong></a>
            </div>
        </div>
    </main>
</body>
</html>
