<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In to Your Account | PurseLens</title>
    <link rel="stylesheet" href="../../css/pages/sign_in.css">
    <link rel="stylesheet" href="../../css/themes/light.css">
    <link rel="shortcut icon" href="../../assets/images/PurseLens_logo.png" type="image/x-icon">
</head>
<body>
    <main>
        <div class="main-container">
            <div class="title-wrapper">
                <img src="../../assets/images/PurseLens_logo.png" alt="PurseLens logo">
                <h2>PurseLens</h2>
            </div>
            <div class="heading-wrapper">
                <h1>Welcome back</h1>
                <p>Secure access to your financial narrative.</p>
            </div>
            <form action="/api/auth/login/" method="POST">
                <fieldset>
                    <label for="email-input">Email</label>
                    <input type="email" name="email" id="email-input" placeholder="james.smith@example.com">
                </fieldset>
                <fieldset>
                    <label for="password-input">Password</label>
                    <input type="password" name="password" id="password-input" placeholder="••••••••••••">
                </fieldset>
                <input type="button" value="Login" id="login-btn">
            </form>
            <div class="social-wrapper">
                <div class="divider">
                    <hr class="divider-line">
                    <p>Or continue with</p>
                    <hr class="divider-line">
                </div>
                <div class="oauth-wrapper">
                    <a href="http://{domain_main}/accounts/google/login/callback/">
                        <img src="../../assets/images/google-logo.png" alt="Google logo">
                        continue with Google
                    </a>
                </div>
            </div>
            <div class="sign-up-wrapper">
                <p>Don't have an account?</p>
                <a href="../../pages/auth/register.html"><strong>Register here</strong></a>
            </div>
            <div class="input-validation-wrapper">
                <p class="error-output">Your password must be 12 characters or more.</p>
            </div>
        </div>
    </main>
</body>
</html>
